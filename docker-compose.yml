
services:
  xray:
    image: "${XRAY_IMAGE:-teddysun/xray:26.4.15}"
    container_name: xray
    restart: unless-stopped
    ports:
      - "${XRAY_PORT}:443/tcp"
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./data:/etc/xray/data
    environment:
      - TZ=UTC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
